<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Connection — Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0A0A0F;
      --border:  #1E1E2E;
      --blue:    #4F8EF7;
      --purple:  #8B5CF6;
      --green:   #30D97A;
      --red:     #F75F4F;
      --ghost:   #E8E8F0;
      --dim:     #6B6B80;
      --card:    #16161F;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ghost);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 1; pointer-events: none;
    }

    .shell {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; gap: 0;
    }

    /* ── WiFi Icon ── */
    .signal-wrap { width: 96px; height: 96px; margin-bottom: 2.5rem; }
    .signal-svg  { width: 100%; height: 100%; }

    .arc {
      fill: none; stroke-linecap: round; stroke-width: 5;
      opacity: 0; animation: pulseArc 2.8s ease-in-out infinite;
    }
    .arc-3 { stroke: var(--red); animation-delay: 0s;   }
    .arc-2 { stroke: var(--red); animation-delay: .15s; }
    .arc-1 { stroke: var(--red); animation-delay: .30s; }

    @keyframes pulseArc {
      0%,100% { opacity: 0; }
      40%,60%  { opacity: 1; }
    }

    .dot {
      fill: var(--red);
      animation: dotPulse 2.8s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity: .6; }
      50%     { opacity: 1;  }
    }

    .slash {
      stroke: var(--red); stroke-width: 4; stroke-linecap: round;
      animation: slashFade 2.8s ease-in-out infinite;
    }
    @keyframes slashFade {
      0%,100% { opacity: .4; }
      50%     { opacity: 1;  }
    }

    /* Reconnected state — icon turns green */
    .signal-wrap.connected .arc  { stroke: var(--green) !important; animation: none; opacity: 1; }
    .signal-wrap.connected .dot  { fill: var(--green)  !important; animation: none; opacity: 1; }
    .signal-wrap.connected .slash { display: none; }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: .45rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .72rem; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      border-radius: 100px; padding: .35rem .85rem;
      margin-bottom: 1.6rem;
      transition: color .4s, background .4s, border-color .4s;
      color: var(--red);
      background: rgba(247,95,79,.08);
      border: 1px solid rgba(247,95,79,.22);
    }
    .badge.online {
      color: var(--green);
      background: rgba(48,217,122,.08);
      border-color: rgba(48,217,122,.3);
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 1.2s ease-in-out infinite;
    }
    .badge.online .badge-dot { animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Headline ── */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700; line-height: 1.1;
      letter-spacing: -.02em; text-align: center;
      margin-bottom: .9rem;
      background: linear-gradient(135deg, var(--ghost) 30%, var(--dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: background .4s;
    }

    .sub {
      font-size: 1rem; color: var(--dim);
      text-align: center; max-width: 420px;
      line-height: 1.65; margin-bottom: 2.6rem;
      font-weight: 300;
    }

    /* ── Status card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.8rem;
      display: flex; align-items: center; gap: 1.2rem;
      width: 100%; max-width: 420px;
      margin-bottom: 2rem;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0 0 auto 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: translateX(100%);  opacity: 0; }
    }

    .card-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: rgba(79,142,247,.08);
      border: 1px solid rgba(79,142,247,.15);
      display: grid; place-items: center; flex-shrink: 0;
    }
    .card-icon svg { width: 18px; height: 18px; }

    .card-body { flex: 1; min-width: 0; }
    .card-label {
      font-size: .7rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--dim); margin-bottom: .25rem;
    }
    .card-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .95rem; font-weight: 500; color: var(--ghost);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Progress bar ── */
    .progress-wrap { width: 100%; max-width: 420px; margin-bottom: 2.4rem; }
    .progress-head {
      display: flex; justify-content: space-between;
      font-size: .72rem; color: var(--dim);
      margin-bottom: .5rem; font-weight: 500;
    }
    .progress-track {
      height: 3px; background: var(--border);
      border-radius: 100px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      width: 0%; transition: width .4s ease;
    }

    /* ── Button ── */
    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .9rem; font-weight: 600; letter-spacing: .03em;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none; border-radius: 12px;
      padding: .85rem 2.2rem; cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 28px rgba(79,142,247,.18);
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,.12);
      opacity: 0; transition: opacity .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 36px rgba(79,142,247,.3); }
    .btn:hover::after { opacity: 1; }
    .btn:active  { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: rgba(48,217,122,.1);
      border: 1px solid rgba(48,217,122,.3);
      border-radius: 100px;
      padding: .6rem 1.4rem;
      font-size: .82rem; font-weight: 500; color: var(--green);
      display: flex; align-items: center; gap: .5rem;
      white-space: nowrap;
      transition: transform .5s cubic-bezier(.22,1,.36,1), opacity .5s ease;
      opacity: 0; z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      .arc, .dot, .slash, .badge-dot, .card::before, .progress-fill {
        animation: none !important; transition: none !important;
      }
    }
    @media (max-width: 480px) {
      .card { border-radius: 12px; padding: 1.1rem 1.2rem; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="shell">

  <div class="signal-wrap" id="signalWrap">
    <svg class="signal-svg" viewBox="0 0 96 96" fill="none">
      <path class="arc arc-3" d="M14 54 Q48 20 82 54" />
      <path class="arc arc-2" d="M24 62 Q48 36 72 62" />
      <path class="arc arc-1" d="M34 70 Q48 52 62 70" />
      <circle class="dot" cx="48" cy="76" r="5" />
      <line  class="slash" x1="74" y1="18" x2="22" y2="80" />
    </svg>
  </div>

  <div class="badge" id="badge">
    <span class="badge-dot"></span>
    <span id="badgeText">No Internet Connection</span>
  </div>

  <h1 id="headline">Connection Lost</h1>

  <p class="sub" id="subText">
    Your device isn't connected to the internet.
    Check your WiFi or mobile data — you'll be
    automatically redirected when the connection returns.
  </p>

  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-label">Last Visited Page</div>
      <div class="card-value" id="lastPage">Loading…</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-head">
      <span id="progressLabel">Checking connection in</span>
      <span id="countdown">10s</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <button class="btn" id="retryBtn" onclick="manualRetry()">
    Try Again Now
  </button>

</div>

<div class="toast" id="toast">
  <span>✓</span> Connection restored! Redirecting…
</div>

<script>
/* ─── Starfield ─── */
(function () {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; }
  function init() {
    stars = [];
    for (let i = 0; i < 130; i++) {
      stars.push({
        x: Math.random() * c.width,
        y: Math.random() * c.height,
        r: Math.random() * 1.2 + .2,
        speed: Math.random() * .008 + .003,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
  function draw(t) {
    ctx.clearRect(0, 0, c.width, c.height);
    stars.forEach(s => {
      const a = .15 + .85 * (Math.sin(t * s.speed + s.phase) * .5 + .5);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,232,240,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); init(); });
  resize(); init(); requestAnimationFrame(draw);
})();

/* ─── Last Page URL ─── */
const lastPageEl = document.getElementById('lastPage');

// Priority: URL param → sessionStorage → referrer
const params    = new URLSearchParams(location.search);
const paramURL  = params.get('from');
const storedURL = sessionStorage.getItem('offlineReturnURL');
const returnURL = paramURL || storedURL || document.referrer || '/';

if (returnURL && returnURL !== location.href && returnURL !== window.location.origin + '/offline.html') {
  sessionStorage.setItem('offlineReturnURL', returnURL);
}

try {
  const u = new URL(returnURL, location.origin);
  lastPageEl.textContent = u.hostname + (u.pathname.length > 1 ? u.pathname : '');
} catch {
  lastPageEl.textContent = 'Previous page';
}

/* ─── Countdown / Progress Bar ─── */
const INTERVAL  = 10;
let remaining   = INTERVAL;
let reconnected = false;

const fillEl      = document.getElementById('progressFill');
const countEl     = document.getElementById('countdown');
const progressLbl = document.getElementById('progressLabel');

function resetCountdown() {
  remaining = INTERVAL;
  fillEl.style.width = '0%';
  countEl.textContent = INTERVAL + 's';
}

function tick() {
  if (reconnected) return;
  remaining = Math.max(0, remaining - 1);
  const pct = ((INTERVAL - remaining) / INTERVAL) * 100;
  fillEl.style.width = pct + '%';
  countEl.textContent = remaining + 's';

  if (remaining <= 0) {
    resetCountdown();
    checkConnection();
  }
}

const tickTimer = setInterval(tick, 1000);

/* ─── Connection Check (multi-URL fallback) ─── */
const PROBE_URLS = [
  'https://www.google.com/favicon.ico',
  'https://httpbin.org/get',
  'https://api.ipify.org/?format=json'
];
let probeIndex = 0;

async function checkConnection() {
  if (reconnected) return;

  const url = PROBE_URLS[probeIndex % PROBE_URLS.length];
  probeIndex++;

  try {
    const res = await fetch(url, {
      method: 'GET',
      mode: 'no-cors',       // avoids CORS block — opaque response still proves connectivity
      cache: 'no-store',
      signal: AbortSignal.timeout(5000)
    });
    // With mode:'no-cors' a successful fetch (even opaque) means we're online
    onReconnected();
  } catch (err) {
    // Still offline — nothing to do
  }
}

/* ─── On Reconnected ─── */
function onReconnected() {
  if (reconnected) return;
  reconnected = true;
  clearInterval(tickTimer);

  // Update UI to "connected" state
  document.getElementById('signalWrap').classList.add('connected');
  const badge = document.getElementById('badge');
  badge.classList.add('online');
  document.getElementById('badgeText').textContent = 'Connection Restored!';
  document.getElementById('headline').textContent  = 'Back Online';
  document.getElementById('subText').textContent   = 'Your internet connection is restored. Taking you back now…';
  document.getElementById('progressLabel').textContent = 'Redirecting in';
  document.getElementById('retryBtn').disabled = true;

  // Fill bar to 100% over 2s
  fillEl.style.transition = 'width 2s linear';
  fillEl.style.width = '100%';
  fillEl.style.background = 'var(--green)';
  countEl.textContent = '2s';

  // Show toast
  document.getElementById('toast').classList.add('show');

  // Tick down 2→1→0
  let c = 2;
  const tid = setInterval(() => {
    c--;
    countEl.textContent = c + 's';
    if (c <= 0) clearInterval(tid);
  }, 1000);

  // Redirect
  setTimeout(() => {
    const target = sessionStorage.getItem('offlineReturnURL') || '/';
    try {
      // If the SW cached the page, a normal navigation will work
      window.location.replace(target);
    } catch {
      window.location.href = target;
    }
  }, 2000);
}

/* ─── Manual Retry ─── */
function manualRetry() {
  if (reconnected) return;
  resetCountdown();
  checkConnection();
}

/* ─── Native browser online event (instant trigger) ─── */
window.addEventListener('online', () => {
  // Small delay so the network is actually ready
  setTimeout(checkConnection, 600);
});

/* ─── Also listen to SW messages ─── */
if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'ONLINE') onReconnected();
  });
}

/* ─── Run an immediate check on load ─── */
checkConnection();
</script>
</body>
</html>
