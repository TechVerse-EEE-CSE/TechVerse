<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>সংযোগ নেই — অফলাইন</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0A0A0F;
      --surface:   #12121A;
      --border:    #1E1E2E;
      --blue:      #4F8EF7;
      --purple:    #8B5CF6;
      --red:       #F75F4F;
      --ghost:     #E8E8F0;
      --dim:       #6B6B80;
      --card:      #16161F;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ghost);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Starfield canvas ── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Grid noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Layout ── */
    .shell {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── Signal Icon ── */
    .signal-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 2.5rem;
    }

    .signal-svg { width: 100%; height: 100%; }

    .arc {
      fill: none;
      stroke-linecap: round;
      stroke-width: 5;
      transform-origin: 48px 70px;
      opacity: 0;
      animation: pulseArc 2.8s ease-in-out infinite;
    }
    .arc-1 { stroke: var(--red);    r: 14; animation-delay: 0s;    }
    .arc-2 { stroke: var(--red);    r: 26; animation-delay: .15s;  opacity: .6; }
    .arc-3 { stroke: var(--red);    r: 38; animation-delay: .30s;  opacity: .3; }

    @keyframes pulseArc {
      0%,100% { opacity: 0;   }
      40%,60%  { opacity: 1;   }
    }

    .dot {
      fill: var(--red);
      animation: dotPulse 2.8s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { r: 4; opacity: .6; }
      50%      { r: 6; opacity: 1;  }
    }

    .slash {
      stroke: var(--red);
      stroke-width: 4;
      stroke-linecap: round;
      animation: slashFade 2.8s ease-in-out infinite;
    }
    @keyframes slashFade {
      0%,100% { opacity: .4; }
      50%      { opacity: 1;  }
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--red);
      background: rgba(247,95,79,.08);
      border: 1px solid rgba(247,95,79,.22);
      border-radius: 100px;
      padding: .35rem .85rem;
      margin-bottom: 1.6rem;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Headline ── */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.02em;
      text-align: center;
      margin-bottom: .9rem;
      background: linear-gradient(135deg, var(--ghost) 30%, var(--dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 1rem;
      color: var(--dim);
      text-align: center;
      max-width: 420px;
      line-height: 1.65;
      margin-bottom: 2.6rem;
      font-weight: 300;
    }

    /* ── Status card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      width: 100%;
      max-width: 420px;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    .card-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(79,142,247,.08);
      border: 1px solid rgba(79,142,247,.15);
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .card-icon svg { width: 18px; height: 18px; }

    .card-body { flex: 1; min-width: 0; }
    .card-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: .25rem;
    }
    .card-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      color: var(--ghost);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 100%;
      max-width: 420px;
      margin-bottom: 2.4rem;
    }
    .progress-head {
      display: flex;
      justify-content: space-between;
      font-size: .72rem;
      color: var(--dim);
      margin-bottom: .5rem;
      font-weight: 500;
    }
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      width: 0%;
      transition: width .4s ease;
    }

    /* ── Retry button ── */
    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .03em;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none;
      border-radius: 12px;
      padding: .85rem 2.2rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 0 28px rgba(79,142,247,.18);
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.12);
      opacity: 0;
      transition: opacity .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 36px rgba(79,142,247,.3); }
    .btn:hover::after { opacity: 1; }
    .btn:active { transform: translateY(0); }

    /* ── Auto-reconnect toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: rgba(30,255,130,.1);
      border: 1px solid rgba(30,255,130,.3);
      border-radius: 100px;
      padding: .6rem 1.4rem;
      font-size: .82rem;
      font-weight: 500;
      color: #4fffaa;
      display: flex;
      align-items: center;
      gap: .5rem;
      white-space: nowrap;
      transition: transform .5s cubic-bezier(.22,1,.36,1), opacity .5s ease;
      opacity: 0;
      z-index: 100;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast-icon { font-size: 1rem; }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .arc, .dot, .slash, .badge-dot, .card::before, .progress-fill {
        animation: none !important;
        transition: none !important;
      }
    }

    @media (max-width: 480px) {
      .card { border-radius: 12px; padding: 1.1rem 1.2rem; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="shell">

  <!-- Animated WiFi Signal -->
  <div class="signal-wrap">
    <svg class="signal-svg" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Arcs -->
      <path class="arc arc-3" d="M14 54 Q48 20 82 54" />
      <path class="arc arc-2" d="M24 62 Q48 36 72 62" />
      <path class="arc arc-1" d="M34 70 Q48 52 62 70" />
      <!-- Dot -->
      <circle class="dot" cx="48" cy="76" r="4" />
      <!-- Slash (disconnected) -->
      <line class="slash" x1="72" y1="20" x2="20" y2="80" />
    </svg>
  </div>

  <!-- Status Badge -->
  <div class="badge">
    <span class="badge-dot"></span>
    NO INTERNET CONNECTION
  </div>

  <!-- Headline -->
  <h1>NO CONNECTION</h1>

  <p class="sub">
    Please check your internet connection and try again later.
  </p>

  <!-- Last Page Card -->
  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-label">view last page</div>
      <div class="card-value" id="lastPage"> loading please wait</div>
    </div>
  </div>

  <!-- Auto-retry progress -->
  <div class="progress-wrap">
    <div class="progress-head">
      <span>Automatically re-checking...</span>
      <span id="countdown">10 sec</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Retry Button -->
  <button class="btn" id="retryBtn" onclick="manualRetry()">
    try again
  </button>

</div>

<!-- Toast Notification -->
<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  The internet connection is back…
</div>

<script>
  /* ─── Starfield ─── */
  (function () {
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function init() {
      stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.2 + .2,
          a: Math.random(),
          speed: Math.random() * .008 + .003,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a = .2 + .8 * (Math.sin(t * s.speed + s.phase) * .5 + .5);
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232,232,240,${s.a})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); init(); });
    resize(); init(); requestAnimationFrame(draw);
  })();

  /* ─── Last Page ─── */
  const lastPageEl = document.getElementById('lastPage');
  const storedURL = sessionStorage.getItem('offlineReturnURL') || document.referrer || location.href;
  sessionStorage.setItem('offlineReturnURL', storedURL);

  try {
    const u = new URL(storedURL);
    lastPageEl.textContent = u.hostname + (u.pathname !== '/' ? u.pathname : '');
  } catch {
    lastPageEl.textContent = 'পূর্ববর্তী পেজ';
  }

  /* ─── Auto-retry countdown ─── */
  const INTERVAL = 10; // seconds
  let remaining = INTERVAL;
  const fillEl     = document.getElementById('progressFill');
  const countEl    = document.getElementById('countdown');
  const bnEn       = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];

  function toBengali(n) {
    return String(n).split('').map(d => bnEn[+d]).join('');
  }

  function tick() {
    remaining--;
    const pct = ((INTERVAL - remaining) / INTERVAL) * 100;
    fillEl.style.width = pct + '%';
    countEl.textContent = toBengali(remaining) + ' সে';

    if (remaining <= 0) {
      remaining = INTERVAL;
      checkConnection();
    }
  }

  let tickTimer = setInterval(tick, 1000);

  /* ─── Connection Check ─── */
  async function checkConnection() {
    try {
      const res = await fetch('https://www.gstatic.com/generate_204', {
        method: 'HEAD',
        cache: 'no-store',
        signal: AbortSignal.timeout(4000)
      });
      if (res.ok || res.status === 204) {
        onReconnected();
      }
    } catch {
      /* still offline */
    }
  }

  function onReconnected() {
    clearInterval(tickTimer);

    // Show toast
    const toast = document.getElementById('toast');
    toast.classList.add('show');

    // Redirect after short delay
    setTimeout(() => {
      const target = sessionStorage.getItem('offlineReturnURL') || '/';
      window.location.href = target;
    }, 1800);
  }

  function manualRetry() {
    remaining = INTERVAL;
    fillEl.style.width = '0%';
    countEl.textContent = toBengali(INTERVAL) + ' সে';
    checkConnection();
  }

  /* ─── Native online event ─── */
  window.addEventListener('online', () => {
    // Extra safety: wait 800ms then verify
    setTimeout(checkConnection, 800);
  });

  /* ─── Initial check (maybe came from SW with connectivity) ─── */
  checkConnection();
</script>
</body>
</html>
